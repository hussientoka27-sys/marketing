<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI System</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="auth">

<div class="auth-card">

    <h1 id="title">AI Marketing System</h1>
    <p id="subtitle">Smart decision platform</p>

    <p class="link" onclick="forgot()">Forgot Password?</p>

    <p class="link" onclick="toggleLang()">🌐 Change Language</p>

</div>

<script src="script.js"></script>
</body>
</html>
